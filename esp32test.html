<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Connection Test</title>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f2f5; }
        .card { background: white; border-radius: 12px; padding: 20px; margin: 10px 0; }
        .connected { color: green; font-weight: bold; }
        .disconnected { color: red; font-weight: bold; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        #log { background: #1e1e1e; color: #d4d4d4; padding: 10px; height: 300px; overflow-y: auto; font-family: monospace; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔌 ESP32 WebSocket Test</h2>
        <div>
            ESP32 IP: <input type="text" id="espIp" value="192.168.234.126" size="15">
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()">Disconnect</button>
            <button onclick="sendTest()">Send Test</button>
        </div>
        <div style="margin-top: 10px;">
            Status: <span id="status" class="disconnected">Disconnected</span>
        </div>
    </div>
    <div class="card">
        <h3>📡 Communication Log</h3>
        <div id="log"></div>
    </div>
    
    <script>
        let ws = null;
        
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const colors = {
                info: '#d4d4d4',
                success: '#4ec9b0',
                error: '#f48771',
                sent: '#ce9178',
                received: '#9cdcfe'
            };
            logDiv.innerHTML += `<div style="color: ${colors[type]}">[${time}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function connect() {
            const ip = document.getElementById('espIp').value;
            const wsUrl = `ws://${ip}:81`;
            
            log(`Connecting to ${wsUrl}...`);
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    const status = document.getElementById('status');
                    status.innerHTML = 'Connected ✅';
                    status.className = 'connected';
                    log('✅ WebSocket connected successfully!', 'success');
                };
                
                ws.onclose = () => {
                    const status = document.getElementById('status');
                    status.innerHTML = 'Disconnected ❌';
                    status.className = 'disconnected';
                    log('❌ WebSocket disconnected', 'error');
                };
                
                ws.onerror = (error) => {
                    log(`⚠️ WebSocket error: ${error}`, 'error');
                };
                
                ws.onmessage = (event) => {
                    log(`📨 Received: ${event.data}`, 'received');
                };
                
            } catch(e) {
                log(`❌ Failed to connect: ${e.message}`, 'error');
            }
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                log('Disconnected manually');
            }
        }
        
        function sendTest() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const testMsg = "PING";
                ws.send(testMsg);
                log(`📤 Sent: ${testMsg}`, 'sent');
            } else {
                log('⚠️ Not connected! Please connect first.', 'error');
            }
        }
    </script>
</body>
</html>
