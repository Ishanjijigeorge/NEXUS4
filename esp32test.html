<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Connection Test</title>
    <style>
        body { font-family: 'DM Sans', sans-serif; padding: 20px; background: #f4f7fd; }
        .card { background: white; border-radius: 24px; padding: 20px; margin: 10px 0; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .connected { color: #10b981; font-weight: bold; }
        .disconnected { color: #dc2626; font-weight: bold; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; border: none; border-radius: 40px; background: #1d4ed8; color: white; }
        button:hover { background: #2563eb; }
        #log { background: #1e1e1e; color: #d4d4d4; padding: 10px; height: 300px; overflow-y: auto; font-family: monospace; border-radius: 16px; }
        input { padding: 10px; border-radius: 40px; border: 1px solid #ddd; margin: 5px; width: 200px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔌 ESP32 WebSocket Test</h2>
        <div>
            <input type="text" id="espIp" placeholder="ESP32 IP Address" value="192.168." size="20">
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()">Disconnect</button>
            <button onclick="sendTest()">Send PING</button>
        </div>
        <div style="margin-top: 10px;">
            Status: <span id="status" class="disconnected">Disconnected</span>
        </div>
    </div>
    <div class="card">
        <h3>📡 Communication Log</h3>
        <div id="log"></div>
    </div>
    
    <script>
        let ws = null;
        
        function log(msg, type = 'info') {
            const logDiv = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const colors = {
                info: '#d4d4d4',
                success: '#4ec9b0',
                error: '#f48771',
                sent: '#ce9178',
                received: '#9cdcfe'
            };
            logDiv.innerHTML += `<div style="color: ${colors[type]}">[${time}] ${msg}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        function connect() {
            let ip = document.getElementById('espIp').value;
            if (!ip) {
                log('Please enter ESP32 IP address', 'error');
                return;
            }
            
            const wsUrl = `ws://${ip}:81`;
            log(`Connecting to ${wsUrl}...`);
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = () => {
                    const status = document.getElementById('status');
                    status.innerHTML = 'Connected ✅';
                    status.className = 'connected';
                    log('✅ WebSocket connected successfully!', 'success');
                };
                
                ws.onclose = () => {
                    const status = document.getElementById('status');
                    status.innerHTML = 'Disconnected ❌';
                    status.className = 'disconnected';
                    log('❌ WebSocket disconnected', 'error');
                };
                
                ws.onerror = (error) => {
                    log(`⚠️ WebSocket error: ${error}`, 'error');
                };
                
                ws.onmessage = (event) => {
                    log(`📨 Received: ${event.data}`, 'received');
                    
                    // Try to parse JSON
                    try {
                        const data = JSON.parse(event.data);
                        if (data.type === 'welcome') {
                            log(`👋 ${data.message} (Role: ${data.role})`, 'success');
                        }
                    } catch(e) {
                        // Not JSON, ignore
                    }
                };
                
            } catch(e) {
                log(`❌ Failed to connect: ${e.message}`, 'error');
            }
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                log('Disconnected manually');
            }
        }
        
        function sendTest() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                const testMsg = JSON.stringify({type: 'command', command: 'PING'});
                ws.send(testMsg);
                log(`📤 Sent: ${testMsg}`, 'sent');
            } else {
                log('⚠️ Not connected! Please connect first.', 'error');
            }
        }
        
        // Auto-connect with default IP if entered
        document.getElementById('espIp').value = '192.168.';
    </script>
</body>
</html>
