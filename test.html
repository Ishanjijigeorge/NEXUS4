<!DOCTYPE html>
<html>
<head>
    <title>Motor Test</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
            background: #f0f0f0;
        }
        .button {
            padding: 20px;
            margin: 10px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            background: #007bff;
            color: white;
        }
        .button:active {
            transform: scale(0.95);
        }
        .emergency {
            background: #dc3545;
        }
        .speed-control {
            margin: 20px 0;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        input[type="range"] {
            width: 100%;
            margin: 10px 0;
        }
        .status {
            padding: 10px;
            margin: 10px 0;
            background: white;
            border-radius: 5px;
            font-family: monospace;
        }
        .connected {
            background: #28a745;
            color: white;
        }
        .disconnected {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <h1>🎮 Wheelchair Motor Test</h1>
    
    <div class="status" id="status">Disconnected</div>
    
    <div class="speed-control">
        <h3>⚡ Motor Speed: <span id="speedValue">20</span>%</h3>
        <input type="range" id="speedSlider" min="0" max="100" value="20">
        <div style="display: flex; gap: 10px; margin-top: 10px;">
            <button class="button" onclick="setSpeed(0)">0%</button>
            <button class="button" onclick="setSpeed(20)">20%</button>
            <button class="button" onclick="setSpeed(40)">40%</button>
            <button class="button" onclick="setSpeed(60)">60%</button>
            <button class="button" onclick="setSpeed(80)">80%</button>
            <button class="button" onclick="setSpeed(100)">100%</button>
        </div>
    </div>
    
    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0;">
        <button class="button" onclick="sendCommand('forward')">⬆️ FORWARD</button>
        <button class="button" onclick="sendCommand('left')">⬅️ LEFT</button>
        <button class="button" onclick="sendCommand('stop')">⏹️ STOP</button>
        <button class="button" onclick="sendCommand('right')">➡️ RIGHT</button>
        <button class="button" onclick="sendCommand('back')">⬇️ BACK</button>
        <button class="button emergency" onclick="emergency()">🚨 EMERGENCY</button>
    </div>
    
    <div class="status" id="log" style="height: 200px; overflow-y: auto; font-size: 12px;">
        Log will appear here...
    </div>

    <script>
        let esp32IP = "192.168.234.126"; // CHANGE THIS TO YOUR ESP32 IP
        let connected = false;
        
        function addLog(msg, isError = false) {
            const log = document.getElementById('log');
            const time = new Date().toLocaleTimeString();
            const color = isError ? 'red' : 'black';
            log.innerHTML += `<div style="color: ${color}">[${time}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }
        
        async function testConnection() {
            try {
                const response = await fetch(`http://${esp32IP}/ping`);
                if (response.ok) {
                    const text = await response.text();
                    if (text === "PONG") {
                        connected = true;
                        document.getElementById('status').innerHTML = '✅ Connected to ESP32';
                        document.getElementById('status').className = 'status connected';
                        addLog('Connected to ESP32');
                        return true;
                    }
                }
            } catch (error) {
                addLog('Connection failed: ' + error.message, true);
            }
            connected = false;
            document.getElementById('status').innerHTML = '❌ Disconnected';
            document.getElementById('status').className = 'status disconnected';
            return false;
        }
        
        async function sendCommand(cmd) {
            if (!connected) {
                addLog('Not connected!', true);
                return;
            }
            
            try {
                addLog(`Sending: CMD:${cmd}`);
                const response = await fetch(`http://${esp32IP}/cmd?data=CMD:${cmd}`);
                if (response.ok) {
                    addLog(`✓ Command sent: ${cmd}`);
                } else {
                    addLog(`✗ Failed: ${response.status}`, true);
                }
            } catch (error) {
                addLog(`✗ Error: ${error.message}`, true);
                connected = false;
            }
        }
        
        async function setSpeed(speed) {
            if (!connected) {
                addLog('Not connected!', true);
                return;
            }
            
            document.getElementById('speedValue').innerText = speed;
            document.getElementById('speedSlider').value = speed;
            
            try {
                addLog(`Setting speed to ${speed}%`);
                const response = await fetch(`http://${esp32IP}/speed?speed=${speed}`);
                if (response.ok) {
                    addLog(`✓ Speed set to ${speed}%`);
                } else {
                    addLog(`✗ Speed set failed`, true);
                }
            } catch (error) {
                addLog(`✗ Error: ${error.message}`, true);
                connected = false;
            }
        }
        
        async function emergency() {
            if (!connected) {
                addLog('Not connected!', true);
                return;
            }
            
            try {
                addLog('🚨 EMERGENCY STOP!');
                await fetch(`http://${esp32IP}/emergency`);
                addLog('✓ Emergency sent');
            } catch (error) {
                addLog(`✗ Error: ${error.message}`, true);
            }
        }
        
        document.getElementById('speedSlider').onchange = (e) => {
            setSpeed(parseInt(e.target.value));
        };
        
        // Auto-connect on load
        setTimeout(testConnection, 1000);
        
        // Keep connection alive
        setInterval(testConnection, 5000);
    </script>
</body>
</html>
