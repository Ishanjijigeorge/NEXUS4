<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 WSS Connection Test</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f2f5;
        }
        .status {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .connecting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        button.primary {
            background: #007bff;
            color: white;
        }
        button.danger {
            background: #dc3545;
            color: white;
        }
        button.success {
            background: #28a745;
            color: white;
        }
        .messages {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .message {
            padding: 5px;
            border-bottom: 1px solid #eee;
            margin: 5px 0;
        }
        .message.sent {
            color: #007bff;
        }
        .message.received {
            color: #28a745;
        }
        .message.error {
            color: #dc3545;
        }
        .info-box {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <h1>🔌 ESP32 WSS Connection Test</h1>
    
    <div class="info-box">
        <strong>Protocol Detection:</strong><br>
        Page loaded over: <span id="pageProtocol"></span><br>
        WebSocket URL: <span id="wsUrlDisplay"></span>
    </div>
    
    <div id="status" class="status disconnected">
        ⚠️ Disconnected
    </div>
    
    <div>
        <button class="primary" onclick="connect()">🔌 Connect</button>
        <button class="danger" onclick="disconnect()">❌ Disconnect</button>
        <button class="success" onclick="sendPing()">📡 Send PING</button>
        <button class="success" onclick="sendStop()">⏹️ Send STOP</button>
        <button class="success" onclick="sendForward()">⬆️ Send FORWARD</button>
    </div>
    
    <div>
        <input type="text" id="customCommand" placeholder="Enter custom command" style="padding:10px; width:70%; margin:10px 0;">
        <button onclick="sendCustom()">Send</button>
    </div>
    
    <div class="messages" id="messages">
        <div class="message">📋 Messages will appear here...</div>
    </div>
    
    <script>
        let ws = null;
        let reconnectAttempts = 0;
        
        // Auto-detect protocol
        const isHTTPS = window.location.protocol === 'https:';
        const protocol = isHTTPS ? 'wss:' : 'ws:';
        const host = window.location.hostname;
        const wsUrl = `${protocol}//${host}:81`;
        
        document.getElementById('pageProtocol').innerText = window.location.protocol;
        document.getElementById('wsUrlDisplay').innerText = wsUrl;
        
        function addMessage(text, type = 'info') {
            const messagesDiv = document.getElementById('messages');
            const time = new Date().toLocaleTimeString();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<strong>[${time}]</strong> ${text}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function updateStatus(status, isConnected) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = status;
            statusDiv.className = isConnected ? 'status connected' : 'status disconnected';
        }
        
        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addMessage('Already connected!', 'error');
                return;
            }
            
            updateStatus('🔄 Connecting to ESP32...', false);
            addMessage(`Connecting to ${wsUrl}...`, 'info');
            
            try {
                ws = new WebSocket(wsUrl);
                
                ws.onopen = function() {
                    updateStatus('✅ Connected to ESP32!', true);
                    addMessage('✅ WebSocket connection established!', 'received');
                    addMessage(`Connected via ${protocol.toUpperCase()}`, 'received');
                    reconnectAttempts = 0;
                };
                
                ws.onclose = function() {
                    updateStatus('❌ Disconnected from ESP32', false);
                    addMessage('❌ Connection closed', 'error');
                    ws = null;
                    
                    if (reconnectAttempts < 5) {
                        reconnectAttempts++;
                        addMessage(`🔄 Reconnecting in ${reconnectAttempts * 2} seconds...`, 'info');
                        setTimeout(connect, reconnectAttempts * 2000);
                    }
                };
                
                ws.onerror = function(error) {
                    addMessage(`⚠️ WebSocket Error: ${error}`, 'error');
                    updateStatus('⚠️ Connection Error', false);
                };
                
                ws.onmessage = function(event) {
                    addMessage(`📨 Received: ${event.data}`, 'received');
                    
                    try {
                        const json = JSON.parse(event.data);
                        addMessage(`📊 Parsed JSON: ${JSON.stringify(json, null, 2)}`, 'received');
                    } catch(e) {}
                };
                
            } catch(error) {
                addMessage(`❌ Failed to connect: ${error.message}`, 'error');
                updateStatus('❌ Connection Failed', false);
            }
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                addMessage('Disconnected manually', 'info');
                updateStatus('❌ Disconnected', false);
            } else {
                addMessage('Not connected', 'error');
            }
        }
        
        function sendCommand(command) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'command', command: command}));
                addMessage(`📤 Sent: ${command}`, 'sent');
            } else {
                addMessage('❌ Not connected to ESP32!', 'error');
            }
        }
        
        function sendPing() { sendCommand("PING"); }
        function sendStop() { sendCommand("CMD_STOP"); }
        function sendForward() { sendCommand("CMD_FORWARD"); }
        
        function sendCustom() {
            const cmd = document.getElementById('customCommand').value;
            if (cmd) {
                sendCommand(cmd);
                document.getElementById('customCommand').value = '';
            }
        }
        
        // Auto-connect on page load
        setTimeout(connect, 1000);
        
        // Heartbeat
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'command', command: "PING"}));
            }
        }, 30000);
    </script>
</body>
</html>
