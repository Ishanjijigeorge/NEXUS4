<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESP32 Connection Test</title>
    <style>
        body {
            font-family: monospace;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f0f2f5;
        }
        .status {
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        .connected {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .disconnected {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .connecting {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        button.primary {
            background: #007bff;
            color: white;
        }
        button.danger {
            background: #dc3545;
            color: white;
        }
        button.success {
            background: #28a745;
            color: white;
        }
        .messages {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }
        .message {
            padding: 5px;
            border-bottom: 1px solid #eee;
            margin: 5px 0;
        }
        .message.sent {
            color: #007bff;
        }
        .message.received {
            color: #28a745;
        }
        .message.error {
            color: #dc3545;
        }
        input {
            padding: 10px;
            width: 70%;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>🔌 ESP32 Wheelchair Bridge Connection Test</h1>
    
    <div id="status" class="status disconnected">
        ⚠️ Disconnected
    </div>
    
    <div>
        <strong>ESP32 IP:</strong> 192.168.234.126:81
        <button class="primary" onclick="connect()">🔌 Connect</button>
        <button class="danger" onclick="disconnect()">❌ Disconnect</button>
        <button class="success" onclick="sendPing()">📡 Send PING</button>
        <button class="success" onclick="sendStop()">⏹️ Send STOP</button>
        <button class="success" onclick="sendForward()">⬆️ Send FORWARD</button>
    </div>
    
    <div>
        <input type="text" id="customCommand" placeholder="Enter custom command (e.g., CMD_LEFT)">
        <button onclick="sendCustom()">Send</button>
    </div>
    
    <div class="messages" id="messages">
        <div class="message">📋 Messages will appear here...</div>
    </div>
    
    <script>
        let ws = null;
        const ESP32_IP = "192.168.234.126";
        const ESP32_PORT = 81;
        
        function addMessage(text, type = 'info') {
            const messagesDiv = document.getElementById('messages');
            const time = new Date().toLocaleTimeString();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `<strong>[${time}]</strong> ${text}`;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function updateStatus(status, isConnected) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerHTML = status;
            statusDiv.className = isConnected ? 'status connected' : 'status disconnected';
        }
        
        function connect() {
            if (ws && ws.readyState === WebSocket.OPEN) {
                addMessage('Already connected!', 'error');
                return;
            }
            
            updateStatus('🔄 Connecting to ESP32...', false);
            addMessage(`Connecting to ws://${ESP32_IP}:${ESP32_PORT}...`, 'info');
            
            try {
                ws = new WebSocket(`ws://${ESP32_IP}:${ESP32_PORT}`);
                
                ws.onopen = function() {
                    updateStatus('✅ Connected to ESP32!', true);
                    addMessage('✅ WebSocket connection established!', 'received');
                    addMessage('ESP32 is ready to receive commands', 'received');
                };
                
                ws.onclose = function() {
                    updateStatus('❌ Disconnected from ESP32', false);
                    addMessage('❌ Connection closed', 'error');
                    ws = null;
                };
                
                ws.onerror = function(error) {
                    addMessage(`⚠️ WebSocket Error: ${error}`, 'error');
                    updateStatus('⚠️ Connection Error', false);
                };
                
                ws.onmessage = function(event) {
                    addMessage(`📨 Received: ${event.data}`, 'received');
                    
                    // Try to parse as JSON
                    try {
                        const json = JSON.parse(event.data);
                        addMessage(`📊 Parsed JSON: ${JSON.stringify(json, null, 2)}`, 'received');
                    } catch(e) {
                        // Not JSON, that's fine
                    }
                };
                
            } catch(error) {
                addMessage(`❌ Failed to connect: ${error}`, 'error');
                updateStatus('❌ Connection Failed', false);
            }
        }
        
        function disconnect() {
            if (ws) {
                ws.close();
                ws = null;
                addMessage('Disconnected manually', 'info');
                updateStatus('❌ Disconnected', false);
            } else {
                addMessage('Not connected', 'error');
            }
        }
        
        function sendCommand(command) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(command);
                addMessage(`📤 Sent: ${command}`, 'sent');
            } else {
                addMessage('❌ Not connected to ESP32! Click Connect first.', 'error');
            }
        }
        
        function sendPing() {
            sendCommand("PING");
        }
        
        function sendStop() {
            sendCommand("CMD_STOP");
        }
        
        function sendForward() {
            sendCommand("CMD_FORWARD");
        }
        
        function sendCustom() {
            const cmd = document.getElementById('customCommand').value;
            if (cmd) {
                sendCommand(cmd);
                document.getElementById('customCommand').value = '';
            } else {
                addMessage('Please enter a command', 'error');
            }
        }
        
        // Auto-connect on page load
        setTimeout(() => {
            connect();
        }, 1000);
        
        // Keep connection alive with ping every 30 seconds
        setInterval(() => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send("PING");
                addMessage('💓 Heartbeat PING sent', 'sent');
            }
        }, 30000);
        
        // Log when page closes
        window.addEventListener('beforeunload', () => {
            if (ws) {
                ws.close();
            }
        });
    </script>
</body>
</html>
